{% extends 'base.html' %}

{% block content %}
<h1>Login</h1>
<form method="post">
    <label>Username: <input name="username" required></label><br><br>
    <label>Role:
        <select name="role">
            <option value="engineer">Engineer</option>
            <option value="manager">Manager</option>
        </select>
    </label>
    <br><br>
    <button type="submit">Sign in / Register</button>
</form>

<p>Tip: Managers can create tasks and assign shifts; engineers can view the day's assignments.</p>

{% endblock %}
